<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Admin Login | DICT Attendance System</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/login.css" />
    <script src="./js/config.js"></script>
    <script type="module" src="./js/login.js"></script>
  </head>
  <body class="login-page">
    <main class="login-layout">
      <section class="login-brand" aria-labelledby="system-name">
        <div class="brand-content">
          <img
            class="brand-image"
            src="./assets/dict-header.png"
            alt="Department of Information and Communications Technology"
          />
          <div class="brand-rule"></div>
          <h1 id="system-name">Program and Event Attendance System</h1>
          <p>Monitoring, record review, and official attendance reporting.</p>
        </div>
        <div class="brand-foot">Department of Information and Communications Technology</div>
      </section>

      <section class="login-panel" aria-labelledby="login-heading">
        <button id="login-theme-toggle" class="icon-button login-theme-toggle" type="button" title="Use dark theme" aria-label="Use dark theme" aria-pressed="false">
          <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
        </button>
        <div class="login-form-wrap">
          <div class="mobile-brand">
            <img src="./assets/dict-header.png" alt="DICT" />
          </div>
          <p class="eyebrow">ADMIN PORTAL</p>
          <h2 id="login-heading">Sign in to continue</h2>
          <p class="login-subtitle">Use your assigned Super Admin or Program Admin account.</p>

          <div id="session-message" class="notice notice-info" hidden></div>
          <div id="login-error" class="notice notice-error" role="alert" hidden></div>

          <form id="login-form" novalidate>
            <div class="field-group">
              <label for="email">Email address</label>
              <input
                id="email"
                name="email"
                type="email"
                inputmode="email"
                autocomplete="username"
                maxlength="150"
                aria-describedby="email-error"
                required
              />
              <span id="email-error" class="field-error" aria-live="polite"></span>
            </div>

            <div class="field-group">
              <div class="label-row">
                <label for="password">Password</label>
                <button id="toggle-password" class="icon-button password-toggle" type="button" aria-controls="password" aria-pressed="false" aria-label="Show password" title="Show password">
                  <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                </button>
              </div>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                minlength="8"
                maxlength="72"
                aria-describedby="password-error"
                required
              />
              <span id="password-error" class="field-error" aria-live="polite"></span>
            </div>

            <label class="checkbox-row" for="remember">
              <input id="remember" name="remember" type="checkbox" />
              <span>Keep me signed in on this device</span>
            </label>

            <button id="login-button" class="primary-button full-width" type="submit">
              <span class="button-label">Sign in</span>
              <span class="button-spinner" aria-hidden="true"></span>
            </button>
          </form>

          <div class="connection-row" aria-live="polite">
            <span id="connection-dot" class="connection-dot"></span>
            <span id="connection-text">Checking backend connection...</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
