<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Admin | DICT Attendance System</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/admin.css" />
    <script src="./js/config.js"></script>
    <script type="module" src="./js/admin.js"></script>
  </head>
  <body class="admin-page">
    <div id="app-loading" class="app-loading" role="status">
      <div class="large-spinner"></div>
      <span>Loading admin workspace...</span>
    </div>

    <div id="admin-app" class="admin-shell" hidden>
      <aside id="sidebar" class="sidebar" aria-label="Admin navigation">
        <a class="sidebar-brand" href="#dashboard" aria-label="DICT Attendance System dashboard">
          <img src="./assets/dict-icon.png" alt="" />
          <span class="sidebar-brand-copy"><strong>DICT Attendance</strong><small>Monitoring System</small></span>
        </a>

        <nav class="sidebar-nav">
          <div class="nav-group">
            <p class="nav-group-label">Overview</p>
            <button class="nav-item" data-view="dashboard" type="button" title="Dashboard">
              <svg class="nav-symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></svg>
              <span>Dashboard</span>
            </button>
          </div>
          <div class="nav-group">
            <p class="nav-group-label">Operations</p>
            <button class="nav-item" data-view="programs" type="button" title="Programs">
              <svg class="nav-symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 5V3h6v2" /><path d="M8 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" /><rect x="8" y="3" width="8" height="4" rx="1" /><path d="M8 12h8M8 16h5" /></svg>
              <span>Programs</span>
            </button>
            <button class="nav-item" data-view="events" type="button" title="Events">
              <svg class="nav-symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2" /><path d="M7 3v4M17 3v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01" /></svg>
              <span>Events</span>
            </button>
            <button class="nav-item" data-view="reports" type="button" title="Reports">
              <svg class="nav-symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2" /></svg>
              <span>Reports</span>
            </button>
          </div>
          <div id="administration-nav-group" class="nav-group" hidden>
            <p class="nav-group-label">Administration</p>
            <button id="units-nav" class="nav-item" data-view="units" type="button" title="Organizational Units" hidden>
              <svg class="nav-symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="5" height="5" rx="1" /><rect x="16" y="3" width="5" height="5" rx="1" /><rect x="16" y="16" width="5" height="5" rx="1" /><path d="M8 5.5h4a4 4 0 0 1 4 4v6.5M12 9.5H8a4 4 0 0 0-4 4V16" /></svg>
              <span>Organizational Units</span>
            </button>
            <button id="users-nav" class="nav-item" data-view="users" type="button" title="Admin Users" hidden>
              <svg class="nav-symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3 5 6v5c0 4.7 3 8.5 7 10 4-1.5 7-5.3 7-10V6l-7-3Z" /><circle cx="12" cy="10" r="2.2" /><path d="M8.5 16c.8-1.4 2-2 3.5-2s2.7.6 3.5 2" /></svg>
              <span>Admin Users</span>
            </button>
            <button id="psgc-nav" class="nav-item" data-view="psgc" type="button" title="PSGC Data" hidden>
              <svg class="nav-symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3V6Z" /><path d="M9 3v15M15 6v15" /></svg>
              <span>PSGC Data</span>
            </button>
          </div>
          <div id="governance-nav-group" class="nav-group" hidden>
            <p class="nav-group-label">Governance</p>
            <button id="audit-nav" class="nav-item" data-view="audit" type="button" title="Audit Logs" hidden>
              <svg class="nav-symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7" /><path d="M3 4v5h5M12 7v5l3 2" /></svg>
              <span>Audit Logs</span>
            </button>
          </div>
        </nav>

        <div class="sidebar-user">
          <div id="user-avatar" class="user-avatar" aria-hidden="true"></div>
          <div class="user-meta">
            <strong id="sidebar-user-name"></strong>
            <span id="sidebar-user-role"></span>
          </div>
          <button id="logout-button" class="logout-button" type="button" title="Sign out" aria-label="Sign out"><span class="material-symbols-outlined" aria-hidden="true">logout</span></button>
        </div>
      </aside>

      <button id="sidebar-scrim" class="sidebar-scrim" type="button" aria-label="Close navigation" hidden></button>

      <section class="workspace">
        <header class="topbar">
          <div class="topbar-left">
            <button id="menu-button" class="icon-button menu-button" type="button" title="Collapse navigation" aria-label="Collapse navigation"><span class="material-symbols-outlined" aria-hidden="true">left_panel_close</span></button>
            <div>
              <p class="topbar-context">DICT ATTENDANCE</p>
              <h1 id="page-title">Dashboard</h1>
            </div>
          </div>
          <div class="topbar-actions">
            <button id="theme-toggle" class="icon-button" type="button" title="Use dark theme" aria-label="Use dark theme" aria-pressed="false"><span class="material-symbols-outlined" aria-hidden="true">dark_mode</span></button>
            <button id="refresh-button" class="secondary-button refresh-button" type="button">
              <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
              <span>Refresh</span>
            </button>
          </div>
        </header>

        <main id="view-root" class="view-root" tabindex="-1"></main>
      </section>
    </div>

    <div id="toast-region" class="toast-region" aria-live="polite"></div>
    <dialog id="workspace-dialog" class="workspace-dialog" aria-labelledby="dialog-title">
      <header class="dialog-header">
        <h2 id="dialog-title"></h2>
        <button id="dialog-close" class="icon-button" type="button" aria-label="Close dialog" title="Close"><span class="material-symbols-outlined" aria-hidden="true">close</span></button>
      </header>
      <div id="dialog-content" class="dialog-content"></div>
    </dialog>
  </body>
</html>
