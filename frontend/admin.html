<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Admin | DICT Attendance System</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/admin.css" />
    <script src="./js/config.js"></script>
    <script type="module" src="./js/admin.js"></script>
  </head>
  <body class="admin-page">
    <div id="app-loading" class="app-loading" role="status">
      <div class="large-spinner"></div>
      <span>Loading admin workspace...</span>
    </div>

    <div id="admin-app" class="admin-shell" hidden>
      <aside id="sidebar" class="sidebar" aria-label="Admin navigation">
        <a class="sidebar-brand" href="#dashboard" aria-label="DICT Attendance System dashboard">
          <span class="sidebar-brand-mark" aria-hidden="true">
            <img class="sidebar-brand-icon-logo" src="./assets/dict-icon.png" alt="" />
          </span>
          <span class="sidebar-brand-copy"><strong>DICT</strong><small>Attendance System</small></span>
        </a>

        <nav class="sidebar-nav">
          <div class="nav-group">
            <p class="nav-group-label">Overview</p>
            <button class="nav-item" data-view="dashboard" type="button" title="Dashboard">

              <span>Dashboard</span>
            </button>
          </div>
          <div class="nav-group">
            <p class="nav-group-label">Operations</p>
            <button class="nav-item" data-view="programs" type="button" title="Programs">
              <svg class="nav-symbol nav-symbol-bootstrap" data-icon="clipboard" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z" /><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0z" /></svg>

            </button>
            <button class="nav-item" data-view="events" type="button" title="Events">

              <span>Events</span>
            </button>
            <button class="nav-item" data-view="reports" type="button" title="Reports">

              <span>Reports</span>
            </button>
          </div>
          <div id="administration-nav-group" class="nav-group" hidden>
            <p class="nav-group-label">Administration</p>
            <button id="units-nav" class="nav-item" data-view="units" type="button" title="Organizational Units" hidden>

              <span>Organizational Units</span>
            </button>
            <button id="users-nav" class="nav-item" data-view="users" type="button" title="Admin Users" hidden>
              <svg class="nav-symbol nav-symbol-bootstrap" data-icon="person-gear" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0M8 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4m.256 7a4.5 4.5 0 0 1-.229-1.004H3c.001-.246.154-.986.832-1.664C4.484 10.68 5.711 10 8 10q.39 0 .74.025c.226-.341.496-.65.804-.918Q8.844 9.002 8 9c-5 0-6 3-6 4s1 1 1 1zm3.63-4.54c.18-.613 1.048-.613 1.229 0l.043.148a.64.64 0 0 0 .921.382l.136-.074c.561-.306 1.175.308.87.869l-.075.136a.64.64 0 0 0 .382.92l.149.045c.612.18.612 1.048 0 1.229l-.15.043a.64.64 0 0 0-.38.921l.074.136c.305.561-.309 1.175-.87.87l-.136-.075a.64.64 0 0 0-.92.382l-.045.149c-.18.612-1.048.612-1.229 0l-.043-.15a.64.64 0 0 0-.921-.38l-.136.074c-.561.305-1.175-.309-.87-.87l.075-.136a.64.64 0 0 0-.382-.92l-.148-.045c-.613-.18-.613-1.048 0-1.229l.148-.043a.64.64 0 0 0 .382-.921l-.074-.136c-.306-.561.308-1.175.869-.87l.136.075a.64.64 0 0 0 .92-.382zM14 12.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0" /></svg>
              <span>Admin Users</span>
            </button>
            <button id="psgc-nav" class="nav-item" data-view="psgc" type="button" title="PSGC Data" hidden>
              <svg class="nav-symbol nav-symbol-bootstrap" data-icon="map" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M15.817.113A.5.5 0 0 1 16 .5v14a.5.5 0 0 1-.402.49l-5 1a.5.5 0 0 1-.196 0L5.5 15.01l-4.902.98A.5.5 0 0 1 0 15.5v-14a.5.5 0 0 1 .402-.49l5-1a.5.5 0 0 1 .196 0L10.5.99l4.902-.98a.5.5 0 0 1 .415.103M10 1.91l-4-.8v12.98l4 .8zm1 12.98 4-.8V1.11l-4 .8zm-6-.8V1.11l-4 .8v12.98z" /></svg>
              <span>PSGC Data</span>
            </button>
          </div>
          <div id="governance-nav-group" class="nav-group" hidden>
            <p class="nav-group-label">Governance</p>
            <button id="audit-nav" class="nav-item" data-view="audit" type="button" title="Audit Logs" hidden>

              <span>Audit Logs</span>
            </button>
          </div>
        </nav>

        <div class="sidebar-user">
          <div id="user-avatar" class="user-avatar" aria-hidden="true"></div>
          <div class="user-meta">
            <strong id="sidebar-user-name"></strong>
            <span id="sidebar-user-role"></span>
          </div>
          <button id="logout-button" class="logout-button" type="button" title="Sign out" aria-label="Sign out"><span class="material-symbols-outlined" aria-hidden="true">logout</span></button>
        </div>
      </aside>

      <button id="sidebar-scrim" class="sidebar-scrim" type="button" aria-label="Close navigation" hidden></button>

      <section class="workspace">
        <header class="topbar">
          <div class="topbar-left">
            <button id="menu-button" class="icon-button menu-button" type="button" title="Collapse navigation" aria-label="Collapse navigation"><span class="material-symbols-outlined" aria-hidden="true">left_panel_close</span></button>
            <div>
              <p class="topbar-context">DICT ATTENDANCE</p>
              <h1 id="page-title">Dashboard</h1>
            </div>
          </div>
          <div class="topbar-actions">
            <button id="theme-toggle" class="icon-button" type="button" title="Use dark theme" aria-label="Use dark theme" aria-pressed="false"><span class="material-symbols-outlined" aria-hidden="true">dark_mode</span></button>
            <button id="refresh-button" class="secondary-button refresh-button" type="button">
              <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
              <span>Refresh</span>
            </button>
          </div>
        </header>

        <main id="view-root" class="view-root" tabindex="-1"></main>
      </section>
    </div>

    <div id="toast-region" class="toast-region" aria-live="polite"></div>
    <dialog id="workspace-dialog" class="workspace-dialog" aria-labelledby="dialog-title">
      <header class="dialog-header">
        <h2 id="dialog-title"></h2>
        <button id="dialog-close" class="icon-button" type="button" aria-label="Close dialog" title="Close"><span class="material-symbols-outlined" aria-hidden="true">close</span></button>
      </header>
      <div id="dialog-content" class="dialog-content"></div>
    </dialog>
  </body>
</html>
