<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Event Attendance | DICT</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/attendance.css" />
    <script src="./js/config.js"></script>
    <script type="module" src="./js/attendance.js"></script>
  </head>
  <body class="attendance-page">
    <header class="attendance-header">
      <div class="attendance-header-inner">
        <div class="attendance-header-logos">
          <img class="attendance-dict-logo" src="./assets/dict-header.png" alt="Department of Information and Communications Technology" />
          <img class="attendance-program-logo" id="attendance-program-logo" src="" alt="" hidden />
        </div>
        <button id="attendance-theme-toggle" class="icon-button attendance-theme-toggle" type="button" title="Use dark theme" aria-label="Use dark theme" aria-pressed="false">
          <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
        </button>
      </div>
    </header>
    <main id="attendance-root" class="attendance-root" aria-live="polite">
      <section class="attendance-state" role="status">
        <div class="large-spinner"></div>
        <span>Loading event attendance form...</span>
      </section>
    </main>
  </body>
</html>
